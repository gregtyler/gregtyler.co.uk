name: Build site and deploy to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: "posse"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        run: |
          echo "changed_files=$(git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.event.after }} "micro/*.md" | xargs)" >> $GITHUB_OUTPUT
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          cache: "npm"
      - name: npm install
        run: npm install
      - name: Synchronise changes to remote sites
        run: npm run posse -- ${{ steps.changed-files.outputs.changed_files }}
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          MASTODON_URL: ${{ secrets.MASTODON_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
